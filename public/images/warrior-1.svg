<svg viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#7FA87C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- head -->
  <circle cx="72" cy="18" r="10" stroke="#7FA87C"/>
  <!-- neck -->
  <line x1="72" y1="28" x2="72" y2="40"/>
  <!-- shoulders -->
  <line x1="52" y1="48" x2="92" y2="48"/>
  <line x1="72" y1="40" x2="72" y2="48"/>
  <!-- arms raised overhead (V shape) -->
  <line x1="52" y1="48" x2="40" y2="22"/>
  <line x1="40" y1="22" x2="34" y2="8"/>
  <line x1="92" y1="48" x2="104" y2="22"/>
  <line x1="104" y1="22" x2="110" y2="8"/>
  <!-- spine (slight lean) -->
  <line x1="72" y1="48" x2="70" y2="105"/>
  <!-- hips -->
  <line x1="52" y1="105" x2="88" y2="105"/>
  <!-- front (left) leg — knee bent ~90° -->
  <line x1="52" y1="105" x2="42" y2="145"/>
  <line x1="42" y1="145" x2="42" y2="180"/>
  <!-- back (right) leg — straight, extended back -->
  <line x1="88" y1="105" x2="115" y2="148"/>
  <line x1="115" y1="148" x2="128" y2="178"/>
  <!-- feet -->
  <line x1="42" y1="180" x2="28" y2="180"/>
  <line x1="128" y1="178" x2="142" y2="175"/>
  <!-- joint dots -->
  <circle cx="52" cy="48" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="92" cy="48" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="40" cy="22" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="104" cy="22" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="52" cy="105" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="88" cy="105" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="42" cy="145" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="115" cy="148" r="3" fill="#7FA87C" stroke="none"/>
</svg>
