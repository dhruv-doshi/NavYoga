<svg viewBox="0 0 120 200" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#7FA87C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- head -->
  <circle cx="60" cy="16" r="10" stroke="#7FA87C"/>
  <!-- neck -->
  <line x1="60" y1="26" x2="60" y2="38"/>
  <!-- shoulders -->
  <line x1="40" y1="46" x2="80" y2="46"/>
  <line x1="60" y1="38" x2="60" y2="46"/>
  <!-- arms raised overhead -->
  <line x1="40" y1="46" x2="30" y2="22"/>
  <line x1="30" y1="22" x2="26" y2="8"/>
  <line x1="80" y1="46" x2="90" y2="22"/>
  <line x1="90" y1="22" x2="94" y2="8"/>
  <!-- spine (slight forward lean) -->
  <line x1="60" y1="46" x2="57" y2="100"/>
  <!-- hips (low) -->
  <line x1="42" y1="100" x2="72" y2="100"/>
  <!-- left leg — knee bent ~90° -->
  <line x1="42" y1="100" x2="35" y2="140"/>
  <line x1="35" y1="140" x2="46" y2="172"/>
  <!-- right leg — knee bent ~90° -->
  <line x1="72" y1="100" x2="79" y2="140"/>
  <line x1="79" y1="140" x2="68" y2="172"/>
  <!-- feet flat -->
  <line x1="46" y1="172" x2="30" y2="172"/>
  <line x1="68" y1="172" x2="84" y2="172"/>
  <!-- joint dots -->
  <circle cx="40" cy="46" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="80" cy="46" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="30" cy="22" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="90" cy="22" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="42" cy="100" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="72" cy="100" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="35" cy="140" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="79" cy="140" r="3" fill="#7FA87C" stroke="none"/>
</svg>
