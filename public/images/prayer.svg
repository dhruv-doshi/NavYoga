<svg viewBox="0 0 120 195" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#7FA87C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- head -->
  <circle cx="60" cy="18" r="10" stroke="#7FA87C"/>
  <!-- neck -->
  <line x1="60" y1="28" x2="60" y2="40"/>
  <!-- shoulders -->
  <line x1="36" y1="48" x2="84" y2="48"/>
  <line x1="60" y1="40" x2="60" y2="48"/>
  <!-- left arm: shoulder → elbow out to the left, then forearm angling in to chest center -->
  <line x1="36" y1="48" x2="18" y2="70"/>
  <line x1="18" y1="70" x2="60" y2="78"/>
  <!-- right arm: shoulder → elbow out to the right, then forearm angling in to chest center -->
  <line x1="84" y1="48" x2="102" y2="70"/>
  <line x1="102" y1="70" x2="60" y2="78"/>
  <!-- folded hands (small stacked lines at chest) -->
  <line x1="55" y1="74" x2="65" y2="74"/>
  <line x1="55" y1="78" x2="65" y2="78"/>
  <line x1="55" y1="82" x2="65" y2="82"/>
  <!-- spine -->
  <line x1="60" y1="48" x2="60" y2="108"/>
  <!-- hips -->
  <line x1="45" y1="108" x2="75" y2="108"/>
  <!-- left leg -->
  <line x1="45" y1="108" x2="45" y2="152"/>
  <line x1="45" y1="152" x2="44" y2="180"/>
  <!-- right leg -->
  <line x1="75" y1="108" x2="75" y2="152"/>
  <line x1="75" y1="152" x2="76" y2="180"/>
  <!-- feet -->
  <line x1="44" y1="180" x2="32" y2="180"/>
  <line x1="76" y1="180" x2="88" y2="180"/>
  <!-- joint dots -->
  <circle cx="36" cy="48" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="84" cy="48" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="18" cy="70" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="102" cy="70" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="60" cy="78" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="45" cy="108" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="75" cy="108" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="45" cy="152" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="75" cy="152" r="3" fill="#7FA87C" stroke="none"/>
</svg>
