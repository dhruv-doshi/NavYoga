<svg viewBox="0 0 220 185" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#7FA87C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- head -->
  <circle cx="110" cy="18" r="10" stroke="#7FA87C"/>
  <!-- neck -->
  <line x1="110" y1="28" x2="110" y2="40"/>
  <!-- shoulders -->
  <line x1="84" y1="48" x2="136" y2="48"/>
  <line x1="110" y1="40" x2="110" y2="48"/>
  <!-- arms extended horizontally -->
  <line x1="84" y1="48" x2="48" y2="48"/>
  <line x1="48" y1="48" x2="18" y2="48"/>
  <line x1="136" y1="48" x2="172" y2="48"/>
  <line x1="172" y1="48" x2="202" y2="48"/>
  <!-- spine -->
  <line x1="110" y1="48" x2="110" y2="108"/>
  <!-- hips -->
  <line x1="80" y1="108" x2="140" y2="108"/>
  <!-- front (right) leg — knee bent -->
  <line x1="140" y1="108" x2="158" y2="145"/>
  <line x1="158" y1="145" x2="162" y2="175"/>
  <!-- back (left) leg — straight, angled out -->
  <line x1="80" y1="108" x2="58" y2="148"/>
  <line x1="58" y1="148" x2="52" y2="175"/>
  <!-- feet -->
  <line x1="162" y1="175" x2="178" y2="175"/>
  <line x1="52" y1="175" x2="36" y2="175"/>
  <!-- joint dots -->
  <circle cx="84" cy="48" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="136" cy="48" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="48" cy="48" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="172" cy="48" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="80" cy="108" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="140" cy="108" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="158" cy="145" r="3" fill="#7FA87C" stroke="none"/>
  <circle cx="58" cy="148" r="3" fill="#7FA87C" stroke="none"/>
</svg>
